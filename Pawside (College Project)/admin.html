<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pawside — Admin</title>
  <!-- Noindex so search engines don't list this page -->
  <meta name="robots" content="noindex, nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, updateDoc, deleteDoc,
      doc, onSnapshot, query, orderBy, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { firebaseConfig } from './firebase-config.js';

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 🔧 REPLACE with your reCAPTCHA v3 site key
    // self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
    initializeAppCheck(app, {
      provider: new ReCaptchaV3Provider('YOUR_RECAPTCHA_SITE_KEY'),
      isTokenAutoRefreshEnabled: true,
    });

    const db = getFirestore(app);

    // ── Role check ────────────────────────────────────────────────
    const userRole  = sessionStorage.getItem('pawside_role')  || 'staff';
    const userName  = sessionStorage.getItem('pawside_name')  || 'Staff Member';
    const userEmail = sessionStorage.getItem('pawside_email') || '';
    const isAdmin   = userRole === 'admin' || userRole === 'manager';

    // Apply role UI on load
    (function applyRoleUI() {
      const banner      = document.getElementById('role-banner');
      const badgeLabel  = document.getElementById('role-badge-label');
      const bannerMsg   = document.getElementById('role-banner-msg');
      const navName     = document.getElementById('nav-user-name');
      const navBadge    = document.getElementById('nav-role-badge');
      const addBtn      = document.getElementById('add-btn');

      navName.textContent = userName;

      if (isAdmin) {
        const isManager = userRole === 'manager';
        banner.className       = 'role-banner role-admin';
        badgeLabel.textContent = isManager ? '📋 Manager' : '🛡️ Admin';
        bannerMsg.textContent  = 'You have full access — you can view, add, edit, delete and change booking status.';
        navBadge.textContent   = isManager ? 'Manager' : 'Admin';
        navBadge.style.background = 'rgba(78,158,110,0.15)';
        navBadge.style.color      = '#4e9e6e';
        navBadge.style.border     = '1px solid rgba(78,158,110,0.3)';
      } else {
        banner.className       = 'role-banner role-staff';
        badgeLabel.textContent = '👤 Staff';
        bannerMsg.textContent  = 'You have view access — you can see all bookings and update their status.';
        navBadge.textContent   = 'Staff';
        navBadge.style.background = 'rgba(232,168,74,0.15)';
        navBadge.style.color      = '#e8a84a';
        navBadge.style.border     = '1px solid rgba(232,168,74,0.3)';
        // Hide add button for staff
        if (addBtn) addBtn.style.display = 'none';
      }
    })();

    // ── State ──────────────────────────────────────────────────────
    let bookings      = [];
    let editingId     = null;
    let activeFilter  = 'all';
    let searchQuery   = '';

    // ── DOM ────────────────────────────────────────────────────────
    const tableBody     = document.getElementById('table-body');
    const emptyState    = document.getElementById('empty-state');
    const totalCount    = document.getElementById('total-count');
    const pendingCount  = document.getElementById('pending-count');
    const confirmedCount = document.getElementById('confirmed-count');
    const doneCount     = document.getElementById('done-count');
    const searchInput   = document.getElementById('search-input');
    const filterBtns    = document.querySelectorAll('.filter-btn');
    const modal         = document.getElementById('modal');
    const modalOverlay  = document.getElementById('modal-overlay');
    const modalTitle    = document.getElementById('modal-title');
    const addBtn        = document.getElementById('add-btn');

    // ── Real-time listener (wrapped in auth state check) ──────────
    // Without this, onSnapshot fires before auth is restored from
    // localStorage, making request.auth null and failing Firestore rules
    onAuthStateChanged(auth, user => {
      if (!user) {
        // Not signed in — redirect back to login
        console.warn('No authenticated user — redirecting to login.');
        window.location.href = 'LoginPage1.html';
        return;
      }

      const q = query(collection(db, 'bookings'), orderBy('createdAt', 'desc'));
      onSnapshot(q, snap => {
        bookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderAll();
      }, err => {
        console.error('Firestore error:', err.message);
      });
    });

    // ── Render ─────────────────────────────────────────────────────
    function renderAll() {
      // Update stat cards
      totalCount.textContent     = bookings.length;
      pendingCount.textContent   = bookings.filter(b => b.status === 'pending').length;
      confirmedCount.textContent = bookings.filter(b => b.status === 'confirmed').length;
      doneCount.textContent      = bookings.filter(b => b.status === 'complete').length;

      // Filter + search
      let filtered = bookings;
      if (activeFilter !== 'all') filtered = filtered.filter(b => b.status === activeFilter);
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(b =>
          b.ownerName?.toLowerCase().includes(q) ||
          b.petName?.toLowerCase().includes(q) ||
          b.petType?.toLowerCase().includes(q) ||
          b.ownerEmail?.toLowerCase().includes(q)
        );
      }

      if (filtered.length === 0) {
        tableBody.innerHTML = '';
        emptyState.style.display = 'flex';
        return;
      }

      emptyState.style.display = 'none';
      tableBody.innerHTML = filtered.map(b => rowHTML(b)).join('');

      // Row actions
      tableBody.querySelectorAll('.status-select').forEach(sel => {
        sel.addEventListener('change', () => updateStatus(sel.dataset.id, sel.value));
      });
      tableBody.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => openEditModal(btn.dataset.id));
      });
      tableBody.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteBooking(btn.dataset.id));
      });
    }

    function rowHTML(b) {
      const dropOff = b.dropOff ? formatDate(b.dropOff) : '—';
      const pickUp  = b.pickUp  ? formatDate(b.pickUp)  : '—';
      const statusClass = { pending: 'status-pending', confirmed: 'status-confirmed', complete: 'status-done' }[b.status] || 'status-pending';

      return `
        <tr class="table-row">
          <td class="td">
            <div class="owner-name">${esc(b.ownerName || '—')}</div>
            <div class="owner-contact">${esc(b.ownerEmail || '')} ${b.ownerPhone ? '· ' + esc(b.ownerPhone) : ''}</div>
          </td>
          <td class="td">
            <div class="pet-info">${esc(b.petName || '—')}</div>
            <div class="pet-sub">${esc(b.petType || '')}${b.petBreed ? ' · ' + esc(b.petBreed) : ''}</div>
          </td>
          <td class="td">
            <div class="date-range">
              <span class="date-label">Drop:</span> ${dropOff}<br/>
              <span class="date-label">Pick:</span> ${pickUp}
            </div>
          </td>
          <td class="td">
            ${b.notes ? `<div class="notes-cell" title="${esc(b.notes)}">${esc(b.notes.substring(0, 50))}${b.notes.length > 50 ? '…' : ''}</div>` : '<span class="no-notes">—</span>'}
          </td>
          <td class="td">
            <select class="status-select ${statusClass}" data-id="${b.id}">
              <option value="pending"   ${b.status === 'pending'   ? 'selected' : ''}>Pending</option>
              <option value="confirmed" ${b.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
              <option value="complete"  ${b.status === 'complete'  ? 'selected' : ''}>Complete</option>
            </select>
          </td>
          <td class="td td-actions">
            ${b.ownerEmail ? `
              <a class="action-btn email-btn" href="mailto:${esc(b.ownerEmail)}?subject=${encodeURIComponent('Your Booking at Pawside')}&body=${encodeURIComponent(`Hi ${b.ownerName || 'there'},\n\nRegarding your booking for ${b.petName || 'your pet'}.\n\nKind regards,\nPawside Care`)}" title="Email ${esc(b.ownerEmail)}" target="_blank" rel="noopener">✉️</a>
            ` : ''}
            ${isAdmin ? `
              <button class="edit-btn action-btn" data-id="${b.id}" title="Edit">✏️</button>
              <button class="delete-btn action-btn danger-btn" data-id="${b.id}" title="Delete">🗑️</button>
            ` : '<span style="font-size:0.72rem;color:var(--muted);font-style:italic;">View only</span>'}
          </td>
        </tr>`;
    }

    // ── Status update ──────────────────────────────────────────────
    async function updateStatus(id, status) {
      await updateDoc(doc(db, 'bookings', id), { status });
    }

    // ── Delete ─────────────────────────────────────────────────────
    async function deleteBooking(id) {
      if (!confirm('Delete this booking? This cannot be undone.')) return;
      await deleteDoc(doc(db, 'bookings', id));
    }

    // ── Modal (add / edit) ─────────────────────────────────────────
    function openAddModal() {
      editingId = null;
      modalTitle.textContent = 'Add Booking';
      clearForm();
      showModal();
    }

    function openEditModal(id) {
      const b = bookings.find(b => b.id === id);
      if (!b) return;
      editingId = id;
      modalTitle.textContent = 'Edit Booking';
      document.getElementById('f-owner-name').value  = b.ownerName  || '';
      document.getElementById('f-owner-email').value = b.ownerEmail || '';
      document.getElementById('f-owner-phone').value = b.ownerPhone || '';
      document.getElementById('f-pet-name').value    = b.petName    || '';
      document.getElementById('f-pet-type').value    = b.petType    || '';
      document.getElementById('f-pet-breed').value   = b.petBreed   || '';
      document.getElementById('f-drop-off').value    = b.dropOff    || '';
      document.getElementById('f-pick-up').value     = b.pickUp     || '';
      document.getElementById('f-status').value      = b.status     || 'pending';
      document.getElementById('f-notes').value       = b.notes      || '';
      showModal();
    }

    function showModal()  { modal.classList.add('open'); modalOverlay.classList.add('open'); }
    function closeModal() { modal.classList.remove('open'); modalOverlay.classList.remove('open'); editingId = null; }

    function clearForm() {
      ['f-owner-name','f-owner-email','f-owner-phone','f-pet-name','f-pet-type','f-pet-breed','f-drop-off','f-pick-up','f-notes'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('f-status').value = 'pending';
    }

    addBtn.addEventListener('click', openAddModal);
    modalOverlay.addEventListener('click', closeModal);
    document.getElementById('close-modal').addEventListener('click', closeModal);

    document.getElementById('modal-form').addEventListener('submit', async e => {
      e.preventDefault();
      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';

      const data = {
        ownerName:  document.getElementById('f-owner-name').value.trim(),
        ownerEmail: document.getElementById('f-owner-email').value.trim(),
        ownerPhone: document.getElementById('f-owner-phone').value.trim(),
        petName:    document.getElementById('f-pet-name').value.trim(),
        petType:    document.getElementById('f-pet-type').value.trim(),
        petBreed:   document.getElementById('f-pet-breed').value.trim(),
        dropOff:    document.getElementById('f-drop-off').value,
        pickUp:     document.getElementById('f-pick-up').value,
        status:     document.getElementById('f-status').value,
        notes:      document.getElementById('f-notes').value.trim(),
      };

      try {
        if (editingId) {
          await updateDoc(doc(db, 'bookings', editingId), data);
        } else {
          await addDoc(collection(db, 'bookings'), { ...data, createdAt: serverTimestamp() });
        }
        closeModal();
      } catch (err) {
        alert(`Error: ${err.message}`);
      } finally {
        saveBtn.disabled = false; saveBtn.textContent = 'Save Booking';
      }
    });

    // ── Search & filter ────────────────────────────────────────────
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value.trim();
      renderAll();
    });

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderAll();
      });
    });

    // ── Helpers ────────────────────────────────────────────────────
    function formatDate(str) {
      if (!str) return '—';
      const [y, m, d] = str.split('-');
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Sign out ───────────────────────────────────────────────────
    document.getElementById('sign-out-btn').addEventListener('click', async () => {
      const btn = document.getElementById('sign-out-btn');
      btn.disabled    = true;
      btn.textContent = 'Signing out…';
      try {
        await signOut(auth);
        sessionStorage.removeItem('pawside_role');
        sessionStorage.removeItem('pawside_name');
        sessionStorage.removeItem('pawside_email');
        window.location.href = 'LoginPage1.html';
      } catch (err) {
        btn.disabled    = false;
        btn.textContent = 'Sign Out';
        alert(`Sign out failed: ${err.message}`);
      }
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e1015;
      --surface:   #161a22;
      --surface2:  #1e2330;
      --border:    #272d3d;
      --border2:   #323a50;
      --accent:    #4e9e6e;
      --accent2:   #e8a84a;
      --text:      #e8eaf0;
      --muted:     #6e7890;
      --dim:       #3a4055;
      --danger:    #e05050;
      --radius:    10px;

      --pending:   #e8a84a;
      --confirmed: #4e9e6e;
      --done:      #6e7890;
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; font-weight: 300; }

    /* ── NAV ── */
    nav {
      height: 60px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; background: var(--surface);
      position: sticky; top: 0; z-index: 100;
    }

    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 0.6rem; }
    .nav-logo span { color: var(--accent); }
    .nav-badge {
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      background: rgba(78,158,110,0.15); color: var(--accent);
      border: 1px solid rgba(78,158,110,0.3); padding: 0.2rem 0.6rem; border-radius: 4px;
    }

    #sign-out-btn {
      font-family: 'Outfit', sans-serif; font-size: 0.78rem; font-weight: 400;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 0.3rem 0.8rem; cursor: pointer;
      transition: all 0.15s;
    }

    #sign-out-btn:hover:not(:disabled) {
      color: var(--danger);
      border-color: rgba(224,80,80,0.4);
      background: rgba(224,80,80,0.08);
    }

    #sign-out-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── MAIN LAYOUT ── */
    .main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }

    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.2rem 1.4rem;
      display: flex; flex-direction: column; gap: 0.25rem;
      animation: fadeUp 0.4s ease both;
    }

    .stat-card:nth-child(2) { animation-delay: 0.05s; }
    .stat-card:nth-child(3) { animation-delay: 0.1s; }
    .stat-card:nth-child(4) { animation-delay: 0.15s; }

    .stat-label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-card:nth-child(1) .stat-value { color: var(--text); }
    .stat-card:nth-child(2) .stat-value { color: var(--pending); }
    .stat-card:nth-child(3) .stat-value { color: var(--confirmed); }
    .stat-card:nth-child(4) .stat-value { color: var(--done); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
      animation: fadeUp 0.4s 0.2s ease both;
    }

    .toolbar-left { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

    .search-wrap { position: relative; }
    .search-wrap input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 300;
      padding: 0.55rem 0.9rem 0.55rem 2.2rem; outline: none; width: 220px;
      transition: border-color 0.18s;
    }

    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--dim); }

    .search-icon {
      position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 0.85rem; pointer-events: none;
    }

    .filter-btn {
      font-family: 'Outfit', sans-serif; font-size: 0.78rem; font-weight: 400;
      padding: 0.45rem 0.9rem; border-radius: 6px;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
    }

    .filter-btn:hover { color: var(--text); border-color: var(--border2); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-btn[data-filter="pending"].active    { background: var(--pending);   border-color: var(--pending); }
    .filter-btn[data-filter="confirmed"].active  { background: var(--confirmed); border-color: var(--confirmed); }
    .filter-btn[data-filter="complete"].active   { background: var(--muted);     border-color: var(--muted); }

    #add-btn {
      font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 500;
      background: var(--accent); color: #fff; border: none;
      padding: 0.55rem 1.2rem; border-radius: 8px; cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }

    #add-btn:hover { background: #3d8d5e; }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      animation: fadeUp 0.4s 0.25s ease both;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: var(--surface2); border-bottom: 1px solid var(--border); }

    th {
      text-align: left; padding: 0.85rem 1rem;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }

    .table-row { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: var(--surface2); }

    .td { padding: 0.9rem 1rem; vertical-align: top; font-size: 0.88rem; }

    .owner-name { font-weight: 500; }
    .owner-contact { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }

    .pet-info { font-weight: 500; }
    .pet-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }

    .date-range { font-size: 0.82rem; line-height: 1.8; }
    .date-label { color: var(--muted); font-size: 0.72rem; }

    .notes-cell { font-size: 0.8rem; color: var(--muted); max-width: 200px; line-height: 1.4; cursor: help; }
    .no-notes { color: var(--dim); }

    /* Status select */
    .status-select {
      font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 500;
      padding: 0.3rem 0.6rem; border-radius: 6px; border: none; cursor: pointer;
      outline: none; -webkit-appearance: none;
    }

    .status-pending   { background: rgba(232,168,74,0.15); color: var(--pending); }
    .status-confirmed { background: rgba(78,158,110,0.15); color: var(--confirmed); }
    .status-done      { background: rgba(110,120,144,0.15); color: var(--done); }

    /* Action buttons */
    .td-actions { white-space: nowrap; }

    .action-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 0.3rem 0.5rem; cursor: pointer; font-size: 0.85rem;
      transition: all 0.15s; margin-right: 0.3rem;
    }

    .action-btn:hover { background: var(--surface2); border-color: var(--border2); }
    .danger-btn:hover { background: rgba(224,80,80,0.1); border-color: rgba(224,80,80,0.4); }

    /* Empty state */
    #empty-state {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.5rem; padding: 4rem; text-align: center;
    }

    .empty-icon { font-size: 2.5rem; }
    .empty-title { font-family: 'Syne', sans-serif; font-size: 1rem; color: var(--muted); }
    .empty-sub { font-size: 0.82rem; color: var(--dim); }

    /* ── MODAL ── */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
    }

    #modal-overlay.open { display: block; }

    #modal {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      width: 580px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; z-index: 300; opacity: 0;
    }

    #modal.open { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); animation: modalIn 0.22s ease both; }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }

    #modal-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }

    #close-modal {
      background: none; border: 1px solid var(--border); color: var(--muted);
      width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
      font-size: 0.75rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }

    #close-modal:hover { color: var(--text); border-color: var(--border2); }

    #modal-form { padding: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .modal-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .modal-group.full { grid-column: 1 / -1; }

    .modal-label {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }

    .modal-group input,
    .modal-group select,
    .modal-group textarea {
      width: 100%; padding: 0.6rem 0.85rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 300;
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }

    .modal-group input:focus,
    .modal-group select:focus,
    .modal-group textarea:focus { border-color: var(--accent); }

    .modal-group input::placeholder,
    .modal-group textarea::placeholder { color: var(--dim); }
    .modal-group textarea { resize: vertical; min-height: 70px; }

    .modal-divider {
      grid-column: 1 / -1; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim);
      display: flex; align-items: center; gap: 0.75rem; margin: 0.25rem 0;
    }

    .modal-divider::before, .modal-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    #save-btn {
      grid-column: 1 / -1;
      background: var(--accent); color: #fff;
      font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 500;
      border: none; padding: 0.75rem; border-radius: 8px; cursor: pointer;
      transition: all 0.15s; margin-top: 0.25rem;
    }

    #save-btn:hover:not(:disabled) { background: #3d8d5e; }
    #save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Role banner */
    .role-banner {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 2rem;
      font-size: 0.78rem; font-weight: 500;
      border-bottom: 1px solid var(--border);
    }

    .role-banner.role-admin { background: rgba(78,158,110,0.08); color: #4e9e6e; }
    .role-banner.role-staff { background: rgba(232,168,74,0.08); color: #e8a84a; }

    .role-badge {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.18rem 0.55rem; border-radius: 6px;
    }

    .role-admin .role-badge { background: rgba(78,158,110,0.2); color: #4e9e6e; }
    .role-staff .role-badge { background: rgba(232,168,74,0.2);  color: #e8a84a; }

    .staff-restricted { opacity: 0.35; pointer-events: none; cursor: not-allowed; }

    .email-btn {
      text-decoration: none;
      font-size: 0.85rem; padding: 0.2rem 0.35rem;
      border-radius: 5px; transition: background 0.15s;
      display: inline-flex; align-items: center;
    }

    .email-btn:hover { background: rgba(78,158,110,0.12); }

    /* Animations */
    @keyframes fadeUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes modalIn { from { opacity:0; transform:translate(-50%,-50%) scale(0.94); } to { opacity:1; transform:translate(-50%,-50%) scale(1); } }

    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .main { padding: 1rem; }
      table { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">🐾 <span>Pawside</span> Admin</div>
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <span id="nav-user-name" style="font-size:0.8rem;color:var(--muted);"></span>
    <div class="nav-badge" id="nav-role-badge">Staff Only</div>
    <button id="sign-out-btn">Sign Out</button>
  </div>
</nav>
<div class="role-banner" id="role-banner">
  <span class="role-badge" id="role-badge-label"></span>
  <span id="role-banner-msg"></span>
</div>

<div class="main">

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Bookings</div>
      <div class="stat-value" id="total-count">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="pending-count">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Confirmed</div>
      <div class="stat-value" id="confirmed-count">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Complete</div>
      <div class="stat-value" id="done-count">—</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Search bookings…"/>
      </div>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="confirmed">Confirmed</button>
      <button class="filter-btn" data-filter="complete">Complete</button>
    </div>
    <button id="add-btn">+ Add Booking</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Owner</th>
          <th>Pet</th>
          <th>Dates</th>
          <th>Notes</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div id="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No bookings found</div>
      <div class="empty-sub">Bookings submitted through the website will appear here.</div>
    </div>
  </div>

</div>

<!-- Modal overlay -->
<div id="modal-overlay"></div>

<!-- Add/Edit Modal -->
<div id="modal">
  <div class="modal-header">
    <span id="modal-title">Add Booking</span>
    <button id="close-modal">✕</button>
  </div>
  <form id="modal-form">

    <div class="modal-divider">Owner Details</div>

    <div class="modal-group">
      <label class="modal-label">Full Name</label>
      <input id="f-owner-name" type="text" placeholder="Jane Smith" required/>
    </div>
    <div class="modal-group">
      <label class="modal-label">Phone</label>
      <input id="f-owner-phone" type="tel" placeholder="+1 (555) 000-0000"/>
    </div>
    <div class="modal-group full">
      <label class="modal-label">Email</label>
      <input id="f-owner-email" type="email" placeholder="jane@example.com"/>
    </div>

    <div class="modal-divider">Pet Details</div>

    <div class="modal-group">
      <label class="modal-label">Pet Name</label>
      <input id="f-pet-name" type="text" placeholder="Buddy" required/>
    </div>
    <div class="modal-group">
      <label class="modal-label">Type of Animal</label>
      <input id="f-pet-type" type="text" placeholder="Dog, Cat, Rabbit…"/>
    </div>
    <div class="modal-group full">
      <label class="modal-label">Breed / Description</label>
      <input id="f-pet-breed" type="text" placeholder="e.g. Golden Retriever"/>
    </div>

    <div class="modal-divider">Stay Details</div>

    <div class="modal-group">
      <label class="modal-label">Drop-off Date</label>
      <input id="f-drop-off" type="date"/>
    </div>
    <div class="modal-group">
      <label class="modal-label">Pick-up Date</label>
      <input id="f-pick-up" type="date"/>
    </div>
    <div class="modal-group">
      <label class="modal-label">Status</label>
      <select id="f-status">
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="complete">Complete</option>
      </select>
    </div>
    <div class="modal-group full">
      <label class="modal-label">Notes</label>
      <textarea id="f-notes" placeholder="Special needs, medications, dietary requirements…"></textarea>
    </div>

    <button type="submit" id="save-btn">Save Booking</button>
  </form>
</div>

</body>
</html>
